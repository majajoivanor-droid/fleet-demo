apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-content
  namespace: fleet-demo
data:
  index.template.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Fleet Multi-Cluster Platform</title>
      <style>
        body {
          background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
          color: white;
          font-family: Arial;
          text-align: center;
          padding-top: 100px;
        }
        .box {
          background: rgba(255,255,255,0.05);
          padding: 40px;
          border-radius: 15px;
          display: inline-block;
        }
        button {
          margin-top: 20px;
          padding: 10px 20px;
          border: none;
          background: #00ffc3;
          cursor: pointer;
          border-radius: 6px;
        }
      </style>
      <script>
        function loadInfo() {
          document.getElementById("info").innerHTML =
            "Pod: $POD_NAME<br>Node: $NODE_NAME";
        }
      </script>
    </head>
    <body onload="loadInfo()">
      <div class="box">
        <h1>Fleet Multi-Cluster Demo</h1>
        <div id="info"></div>
      </div>
    </body>
    </html>
