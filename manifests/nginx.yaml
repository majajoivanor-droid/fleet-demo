apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: fleet-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:
        - containerPort: 80
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        command: ["/bin/sh","-c"]
        args:
        - |
          envsubst < /usr/share/nginx/html/index.template.html > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'
        volumeMounts:
        - name: content
          mountPath: /usr/share/nginx/html/index.template.html
          subPath: index.template.html

      volumes:
      - name: content
        configMap:
          name: nginx-content
